name: rtc_flutter_sdk
description: Pure RTC Platform Flutter bridge for the Android RTC AAR.
version: 0.1.0
publish_to: "none"

environment:
  sdk: ^3.12.2
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.rtcone.flutter
        pluginClass: RtcFlutterSdkPlugin
