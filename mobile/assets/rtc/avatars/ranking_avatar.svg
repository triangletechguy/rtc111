<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Ranking avatar icon</title>
  <desc id="desc">A podium and star inside a glowing round violet gold avatar for a ranking function.</desc>
  <defs>
