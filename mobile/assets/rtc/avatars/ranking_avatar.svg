  <rect x="25.2" y="30.2" width="13.6" height="16.8" rx="3.2" fill="url(#gold)"/>
  <rect x="12.8" y="35.5" width="12.2" height="11.5" rx="3" fill="url(#silver)" opacity="0.95"/>
