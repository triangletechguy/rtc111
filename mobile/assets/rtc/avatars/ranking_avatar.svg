      <stop offset="0%" stop-color="#9A7CFF"/>
      <stop offset="45%" stop-color="#4C4AE8"/>
      <stop offset="100%" stop-color="#1A172D"/>
    </radialGradient>
    <linearGradient id="gold" x1="17" y1="15" x2="48" y2="48" gradientUnits="userSpaceOnUse">
