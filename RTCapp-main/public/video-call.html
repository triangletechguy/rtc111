<!DOCTYPE html>
<html>
<head>
  <title>Video Chat</title>
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.2.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin:0; background:#0a0a0a; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:16px; padding:24px; }
    h1 { color:#fff; margin:0; }

    /* Lobby */
    #lobby { display:flex; flex-direction:column; align-items:center; gap:16px; }
    #lobby p { color:#888; margin:0; }
    #channelInput {
      background:#1a1a1a; border:1px solid #333; color:#fff;
      padding:12px 20px; border-radius:10px; font-size:16px;
      width:240px; text-align:center; outline:none;
    }
    #channelInput:focus { border-color:#208AEF; }
    #channelInput::placeholder { color:#555; }

    /* Buttons */
    .btn { border:none; padding:14px 44px; border-radius:12px; font-size:17px; cursor:pointer; font-weight:600; transition:opacity 0.15s; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-primary { background:#208AEF; color:#fff; }
    .btn-danger  { background:#e53935; color:#fff; }

    /* Controls row */
    #controls { display:none; gap:12px; flex-wrap:wrap; justify-content:center; }
    .btn-control {
      background:#1e1e1e; color:#fff; border:1px solid #333;
      padding:10px 24px; border-radius:10px; font-size:15px;
      cursor:pointer; transition:background 0.15s;
    }
    .btn-control.muted { background:#444; border-color:#666; }

    /* Videos */
    #videos { display:flex; flex-wrap:wrap; gap:16px; justify-content:center; }
    .video-tile { width:320px; height:240px; background:#1a1a1a; border-radius:12px; overflow:hidden; }

    /* Status / error */
    #status { color:#aaa; font-size:14px; display:none; }
    #error  { color:#ff4d4d; font-size:14px; display:none; text-align:center; max-width:360px; }
  </style>
</head>
<body>
  <h1>🌐 Web Video Chat</h1>

  <div id="lobby">
    <p>Enter a channel name to join</p>
    <input id="channelInput" type="text" placeholder="e.g. main" maxlength="64" />
    <p id="status"></p>
    <p id="error"></p>
    <button id="joinBtn" class="btn btn-primary">Join Call</button>
  </div>

  <div id="controls">
    <button id="muteAudioBtn" class="btn-control">🎤 Mute</button>
    <button id="muteCameraBtn" class="btn-control">📷 Hide Camera</button>
    <button id="endBtn" class="btn btn-danger">End Call</button>
  </div>

  <div id="videos"></div>

  <script>
    const APP_ID = "a2547ce438e34f269a2a2f956cebb68a";
    const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

    let audioTrack = null;
    let videoTrack = null;
    let audioMuted  = false;
    let cameraMuted = false;

    // ── UI helpers ────────────────────────────────────────────────────────────
    function setStatus(msg) {
      const el = document.getElementById("status");
      el.style.display = msg ? "block" : "none";
      el.textContent = msg;
    }

    function setError(msg) {
      const el = document.getElementById("error");
      el.style.display = msg ? "block" : "none";
      el.textContent = msg;
    }

    function friendlyError(e) {
      if (e.name === "NotAllowedError")  return "Camera/microphone access was denied. Please allow permissions and try again.";
      if (e.name === "NotFoundError")    return "No camera or microphone found on this device.";
      if (e.name === "NotReadableError") return "Camera or microphone is already in use by another app.";
      return e.message || "Something went wrong. Please try again.";
    }

    // ── Remote user events — registered once, outside join handler ───────────
    client.on("user-published", async (user, mediaType) => {
      await client.subscribe(user, mediaType);
      if (mediaType === "video") {
        const div = document.createElement("div");
        div.id = "remote-" + user.uid;
        div.className = "video-tile";
        document.getElementById("videos").appendChild(div);
        user.videoTrack.play("remote-" + user.uid);
      }
      if (mediaType === "audio") user.audioTrack.play();
    });

    client.on("user-unpublished", (user) => {
      document.getElementById("remote-" + user.uid)?.remove();
    });

    // ── Join ──────────────────────────────────────────────────────────────────
    document.getElementById("joinBtn").onclick = async () => {
      const channel = document.getElementById("channelInput").value.trim();
      if (!channel) { setError("Please enter a channel name."); return; }

      setError("");
      setStatus("Joining...");
      const joinBtn = document.getElementById("joinBtn");
      joinBtn.disabled = true;

      try {
        await client.join(APP_ID, channel, null, null);
        [audioTrack, videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
        await client.publish([audioTrack, videoTrack]);

        const div = document.createElement("div");
        div.id = "local";
        div.className = "video-tile";
        document.getElementById("videos").appendChild(div);
        videoTrack.play("local");

        // Switch UI: hide lobby, show controls
        document.getElementById("lobby").style.display = "none";
        document.getElementById("controls").style.display = "flex";
        setStatus("");

      } catch (e) {
        setError(friendlyError(e));
        setStatus("");
        joinBtn.disabled = false;
      }
    };

    // ── Mute audio ────────────────────────────────────────────────────────────
    document.getElementById("muteAudioBtn").onclick = async () => {
      if (!audioTrack) return;
      audioMuted = !audioMuted;
      await audioTrack.setMuted(audioMuted);
      const btn = document.getElementById("muteAudioBtn");
      btn.textContent = audioMuted ? "🔇 Unmute" : "🎤 Mute";
      btn.classList.toggle("muted", audioMuted);
    };

    // ── Mute camera ───────────────────────────────────────────────────────────
    document.getElementById("muteCameraBtn").onclick = async () => {
      if (!videoTrack) return;
      cameraMuted = !cameraMuted;
      await videoTrack.setMuted(cameraMuted);
      const btn = document.getElementById("muteCameraBtn");
      btn.textContent = cameraMuted ? "🙈 Show Camera" : "📷 Hide Camera";
      btn.classList.toggle("muted", cameraMuted);
    };

    // ── End call ──────────────────────────────────────────────────────────────
    document.getElementById("endBtn").onclick = async () => {
      videoTrack?.close();
      audioTrack?.close();
      await client.leave();
      window.location.reload();
    };
  </script>
</body>
</html>
