<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    main {
      width: min(100%, 720px);
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }
    h1 { margin: 0; font-size: clamp(28px, 8vw, 44px); letter-spacing: 0; }
    p { margin: 0; color: #aaa; text-align: center; }
    input {
      width: min(100%, 320px);
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      padding: 12px 16px;
      text-align: center;
    }
    input:focus { border-color: #208aef; outline: none; }
    button {
      border: 0;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 32px;
      background: #208aef;
    }
    button.secondary { background: #333; }
    button.danger { background: #e53935; }
    button:disabled { cursor: not-allowed; opacity: 0.55; }
    .controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .video-shell {
      width: min(100%, 640px);
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      overflow: hidden;
      background: #151515;
      border: 1px solid #303030;
      display: grid;
      place-items: center;
    }
    video { width: 100%; height: 100%; object-fit: cover; }
    #status { min-height: 20px; color: #aaa; }
    #error { color: #ff6b6b; min-height: 20px; }
  </style>
</head>
<body>
  <main>
    <h1>Video Chat</h1>
    <p>Enter a channel name and preview your local camera.</p>
    <input id="channelInput" type="text" placeholder="e.g. main" maxlength="64" />
    <div class="video-shell">
      <video id="localVideo" autoplay muted playsinline hidden></video>
      <p id="emptyState">Camera preview is off.</p>
    </div>
    <p id="status"></p>
    <p id="error"></p>
    <div class="controls">
      <button id="startBtn">Start Preview</button>
      <button id="muteBtn" class="secondary" disabled>Mute</button>
      <button id="stopBtn" class="danger" disabled>Stop</button>
    </div>
  </main>

  <script>
    const channelInput = document.getElementById("channelInput");
    const localVideo = document.getElementById("localVideo");
    const emptyState = document.getElementById("emptyState");
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const startBtn = document.getElementById("startBtn");
    const muteBtn = document.getElementById("muteBtn");
    const stopBtn = document.getElementById("stopBtn");

    let stream = null;
    let muted = false;

    function setStatus(message) {
      statusEl.textContent = message || "";
    }

    function setError(message) {
      errorEl.textContent = message || "";
    }

    function stopPreview() {
      stream?.getTracks().forEach(track => track.stop());
      stream = null;
      muted = false;
      localVideo.srcObject = null;
      localVideo.hidden = true;
      emptyState.hidden = false;
      startBtn.disabled = false;
      muteBtn.disabled = true;
      stopBtn.disabled = true;
      muteBtn.textContent = "Mute";
      setStatus("");
    }

    startBtn.addEventListener("click", async () => {
      const channel = channelInput.value.trim();
      if (!channel) {
        setError("Please enter a channel name.");
        return;
      }

      setError("");
      setStatus("Starting preview...");
      startBtn.disabled = true;

      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
        localVideo.srcObject = stream;
        localVideo.hidden = false;
        emptyState.hidden = true;
        muteBtn.disabled = false;
        stopBtn.disabled = false;
        setStatus("Previewing #" + channel);
      } catch (error) {
        startBtn.disabled = false;
        setStatus("");
        setError(error.message || "Could not start camera preview.");
      }
    });

    muteBtn.addEventListener("click", () => {
      if (!stream) return;
      muted = !muted;
      stream.getAudioTracks().forEach(track => { track.enabled = !muted; });
      muteBtn.textContent = muted ? "Unmute" : "Mute";
    });

    stopBtn.addEventListener("click", stopPreview);
    window.addEventListener("beforeunload", stopPreview);
  </script>
</body>
</html>
